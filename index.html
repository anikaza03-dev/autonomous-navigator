<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous Navigation — Live Map v1.0</title>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg-color: #090d16;
            --panel-bg: #1c1e22;
            --panel-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #007aff; 
            --accent-green: #34c759;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
            margin-bottom: 10px;
            width: fit-content;
        }
        .back-btn:hover {
            color: var(--text-main);
        }

        /* 1-е окно: Выбор города */
        #city-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(9, 13, 22, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            transition: opacity 0.4s ease;
        }

        .modal-content {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 2rem;
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            text-align: center;
            box-sizing: border-box;
        }

        .modal-content h2 {
            margin-top: 0;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        /* 2-е окно: Панель Откуда / Куда */
        #setup-panel {
            display: none;
            width: 90%;
            max-width: 360px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 1.2rem;
            box-sizing: border-box;
            margin-top: 15px;
            position: absolute;
            top: 0;
            z-index: 99999 !important;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        /* 3-е окно: Навигация */
        #navigation-panel {
            display: none;
            width: 90%;
            max-width: 450px;
            background: #11141b;
            border: 1px solid rgba(52, 199, 89, 0.3);
            border-radius: 20px;
            padding: 1rem;
            box-sizing: border-box;
            position: absolute;
            top: 15px;
            z-index: 99999 !important;
            box-shadow: 0 12px 30px rgba(0,0,0,0.7);
        }

        .nav-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        #nav-instruction {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 0.4rem;
            text-align: center;
            width: 100%;
        }

        #nav-meta {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 0.2rem;
        }

        .search-container {
            position: relative;
            margin-bottom: 0.8rem;
        }

        .input-box {
           display: flex;
           align-items: center;
           background: rgba(0, 0, 0, 0.4);
           border-radius: 14px;
           padding: 0.7rem 1rem;
           border: 1px solid transparent;
           transition: 0.3s;
           box-sizing: border-box;
        }
        .input-box:focus-within { border-color: var(--accent-blue); }
        
        .input-box span { 
            margin-right: 12px; 
            font-weight: 600; 
            color: var(--text-muted);
            font-size: 0.8rem;
            white-space: nowrap;
        }
        
        .input-box input[type="text"] {
           all: unset !important;
           background: transparent !important;
           border: none !important;
           color: var(--text-main) !important;
           outline: none !important;
           width: 100% !important;
           font-size: 1rem !important;
           padding: 0 !important;
           margin: 0 !important;
        }
        
        .mode-selection { display: flex; gap: 12px; margin-top: 0.8rem; }
        .mode-btn {
            flex: 1;
            background: white;
            color: black;
            border: none;
            padding: 0.8rem;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-btn:hover { opacity: 0.9; }

        .suggest-box {
            display: none;
            position: absolute;
            top: 105%;
            left: 0;
            width: 100%;
            background: #252830;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100000 !important;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .suggest-item {
            padding: 12px 16px;
            font-size: 0.9rem;
            color: #f1f5f9;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .suggest-item:hover {
            background: var(--accent-blue);
            color: white;
        }
    </style>
</head>
<body>

    <!-- 1-е окно -->
    <div id="city-modal">
        <div class="modal-content">
            <h2>В каком вы сейчас городе?</h2>
            <div class="search-container">
                <div class="input-box">
                    <span>ГОРОД</span>
                    <input type="text" id="city-input" placeholder="Например: Днепр" autocomplete="off">
                </div>
                <div id="suggest-city" class="suggest-box"></div>
            </div>
        </div>
    </div>

    <!-- 2-е окно -->
    <div id="setup-panel">
        <button class="back-btn" onclick="backToCitySelect()">← Выбрать другой город</button>

        <div class="search-container">
            <div class="input-box">
                <span>ОТКУДА</span>
                <input type="text" id="from" placeholder="Введите точку отправления" autocomplete="off">
            </div>
            <div id="suggest-from" class="suggest-box"></div>
        </div>

        <div class="search-container">
            <div class="input-box">
                <span>КУДА</span>
                <input type="text" id="to" placeholder="Введите адрес назначения" autocomplete="off">
            </div>
            <div id="suggest-to" class="suggest-box"></div>
        </div>
        
        <div class="mode-selection">
            <button class="mode-btn" onclick="requestSensorPermission('foot')">🚶‍♂️ Пешком</button>
            <button class="mode-btn" onclick="requestSensorPermission('car')">🚗 На авто</button>
        </div>
    </div>

    <!-- 3-е окно -->
    <div id="navigation-panel">
        <div class="nav-header">
            <button class="back-btn" onclick="exitNavigation()" style="margin: 0;">←</button>
            <div style="width: 24px;"></div>
        </div>
        <div id="nav-instruction">Построение маршрута...</div>
        <div id="nav-meta">Осталось: -- мин (-- км)</div>
    </div>

    <div id="map"></div>

    <script>
        let map;
        let markerA, markerB;
        let routeLine = null;
        let coordsA = null;
        let coordsB = null;
        let cityBoundingBox = null;
        let userMarker = null; // Маркер пользователя
        let userPos = { x: 0, y: 0 }; // Текущее смещение
        let heading = 0; // Направление компаса
        let filteredAcc = 0;
        const alphaFilter = 0.15;


        function handleOrientation(event) { 
            // Это будет срабатывать очень часто (десятки раз в секунду)
            console.log('Ориентация (alpha/beta/gamma):', event.alpha, event.beta, event.gamma); 
        } { /* Логика обработки ориентации */ }
        function handleMotion(event) { 
            // Это покажет ускорение устройства
            console.log('Движение (acceleration):', event.acceleration.x, event.acceleration.y, event.acceleration.z); 
        } { /* Логика обработки акселерометра */ }
        // -------------------------------

        window.onload = function() {
            map = L.map('map', { zoomControl: true }).setView([48.4654, 35.0465], 11);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(map);

            setupCityAutocomplete();
            setupAddressAutocomplete('from', 'suggest-from');
            setupAddressAutocomplete('to', 'suggest-to');
        };

        function setupCityAutocomplete() {
            const input = document.getElementById('city-input');
            const suggestBox = document.getElementById('suggest-city');
            let timeoutId;

            input.addEventListener('input', function() {
                clearTimeout(timeoutId);
                const query = this.value.trim();
                if (query.length < 2) { suggestBox.style.display = 'none'; return; }

                timeoutId = setTimeout(() => {
                    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&featuretype=settlement&accept-language=ru&limit=5`;
                    fetch(url, { headers: { 'Accept': 'application/json' } })
                    .then(res => res.json())
                    .then(data => {
                        suggestBox.innerHTML = '';
                        if (!data || data.length === 0) { suggestBox.style.display = 'none'; return; }
                        suggestBox.style.display = 'block';

                        data.forEach(item => {
                            const div = document.createElement('div');
                            div.className = 'suggest-item';
                            div.innerText = item.display_name;
                            div.addEventListener('click', () => {
                                if (item.boundingbox) {
                                    cityBoundingBox = `${item.boundingbox[2]},${item.boundingbox[1]},${item.boundingbox[3]},${item.boundingbox[0]}`;
                                }
                                map.setView([parseFloat(item.lat), parseFloat(item.lon)], 12);
                                document.getElementById('city-modal').style.opacity = '0';
                                setTimeout(() => {
                                    document.getElementById('city-modal').style.display = 'none';
                                    document.getElementById('setup-panel').style.display = 'block';
                                }, 400);
                            });
                            suggestBox.appendChild(div);
                        });
                    });
                }, 400);
            });
        }

function setupAddressAutocomplete(inputId, suggestPanelId) {
    const input = document.getElementById(inputId);
    const suggestBox = document.getElementById(suggestPanelId);
    let timeoutId;

    input.addEventListener('input', function() {
        clearTimeout(timeoutId);
        const query = this.value.trim();
        
        if (query.length < 3) { 
            suggestBox.style.display = 'none'; 
            return; 
        }

        timeoutId = setTimeout(() => {
            let url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&accept-language=ru&limit=5`;
            
            // Безопасная проверка: добавляем фильтр города, только если он выбран
            if (typeof cityBoundingBox !== 'undefined' && cityBoundingBox) {
                url += `&viewbox=${cityBoundingBox}&bounded=1`;
            }

            fetch(url)
            .then(res => res.json())
            .then(data => {
                suggestBox.innerHTML = '';
                if (!data || data.length === 0) { suggestBox.style.display = 'none'; return; }
                suggestBox.style.display = 'block';

                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'suggest-item';
                    div.innerText = item.display_name.split(',').slice(0, 3).join(',');
                    div.onclick = function() {
                        input.value = div.innerText;
                        suggestBox.style.display = 'none';
                        const c = [parseFloat(item.lat), parseFloat(item.lon)];
                        if (inputId === 'to') coordsB = c; else coordsA = c;
                        map.setView(c, 16);
                    };
                    suggestBox.appendChild(div);
                });
            });
        }, 500);
    });
}
       function buildRoute(mode) {
            if (!coordsA || !coordsB) {
                alert("Выберите точки отправления и назначения!");
                return;
            }

            const apiKey = '07564686-b2ef-45b7-a8b3-c90ed1cc2fd4';

            document.getElementById('setup-panel').style.display = 'none';
            document.getElementById('navigation-panel').style.display = 'block';

            const profile = (mode === 'foot') ? 'foot' : 'car';
            const url = `https://graphhopper.com/api/1/route?point=${coordsA[0]},${coordsA[1]}&point=${coordsB[0]},${coordsB[1]}&vehicle=${profile}&locale=ru&key=${apiKey}&type=json&points_encoded=false`;

            fetch(url)
            .then(res => res.json())
            .then(data => {
                if (!data.paths || data.paths.length === 0) {
                    alert("Маршрут не найден! Попробуйте другие точки.");
                    exitNavigation();
                    return;
                }

                const path = data.paths[0];
                const coordinates = path.points.coordinates.map(c => [c[1], c[0]]);

                if (routeLine) map.removeLayer(routeLine);
                if (markerA) map.removeLayer(markerA);
                if (markerB) map.removeLayer(markerB);

                routeLine = L.polyline(coordinates, { color: '#007aff', weight: 6, opacity: 0.8 }).addTo(map);
                if (!userMarker) {
                userMarker = L.circleMarker(coordsA, { 
                radius: 8, fillColor: '#007aff', color: '#fff', weight: 3, fillOpacity: 1 
            }).addTo(map);
        }
                markerA = L.circleMarker(coordsA, { radius: 7, fillColor: '#34c759', color: '#fff', weight: 2, fillOpacity: 1 }).addTo(map);
                markerB = L.circleMarker(coordsB, { radius: 7, fillColor: '#ff3b30', color: '#fff', weight: 2, fillOpacity: 1 }).addTo(map);

                map.fitBounds(routeLine.getBounds(), { padding: [60, 60] });
                document.getElementById('nav-meta').innerText = `${Math.round(path.time / 60000)} мин (${(path.distance / 1000).toFixed(1)} км)`;
            })
            .catch(err => {
                console.error(err);
                alert("Ошибка сети или API ключа.");
                exitNavigation();
            });
        }

        function backToCitySelect() {
            document.getElementById('setup-panel').style.display = 'none';
            const modal = document.getElementById('city-modal');
            modal.style.display = 'flex';
            modal.style.opacity = '1';
            document.getElementById('from').value = '';
            document.getElementById('to').value = '';
            document.getElementById('city-input').value = '';
            coordsA = null;
            coordsB = null;
            if (markerA) map.removeLayer(markerA);
            if (markerB) map.removeLayer(markerB);
        }

        function exitNavigation() {
            if (routeLine) map.removeLayer(routeLine);
            document.getElementById('navigation-panel').style.display = 'none';
            document.getElementById('setup-panel').style.display = 'block';
        }
       let baseHeading = 0; // Должна быть объявлена в начале скрипта

        function requestSensorPermission(mode) {
            // Вспомогательная функция для обработки ориентации
            const handleOrientation = (e) => {
            if (e.alpha !== null) {
            if (baseHeading === 0) baseHeading = e.alpha;
            // Рассчитываем относительный поворот с защитой от "минусовых" значений
            heading = (e.alpha - baseHeading + 360) % 360;
        }
    };

    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(response => {
            if (response === 'granted') {
                window.addEventListener('deviceorientation', handleOrientation);
                window.addEventListener('devicemotion', handleMotion);
                buildRoute(mode);
            }
        });
    } else {
        // Для устройств, не требующих явного разрешения
        window.addEventListener('deviceorientation', handleOrientation);
        window.addEventListener('devicemotion', handleMotion);
        buildRoute(mode);
    }
}
function handleMotion(event) {
    if (!userMarker || !coordsA) return;
    const acc = event.acceleration;
    if (!acc || acc.x === null) return;

    // Считаем ускорение (без Z, так как телефон в кармане/руке движется горизонтально)
    const rawAcc = Math.sqrt(acc.x * acc.x + acc.y * acc.y);
    filteredAcc = (alphaFilter * rawAcc) + ((1 - alphaFilter) * filteredAcc);

    // ВЫВОД В КОНСОЛЬ ДЛЯ ОТЛАДКИ (откройте F12 в браузере телефона, если возможно)
    // console.log("Ускорение:", filteredAcc);

    // Снижаем порог до 0.1, чтобы реагировать на малейшие шаги
    if (filteredAcc > 0.1) { 
        // Увеличиваем масштаб в 10 раз относительно предыдущего
        const scale = 0.00001; 
        
        // Добавляем движение
        userPos.x += Math.sin(heading * Math.PI / 180) * filteredAcc * scale;
        userPos.y += Math.cos(heading * Math.PI / 180) * filteredAcc * scale;

        // Умножаем на 0.05, чтобы сдвиг был заметен на карте сразу
        let targetLat = coordsA[0] + (userPos.y * 0.05); 
        let targetLng = coordsA[1] + (userPos.x * 0.05);

        let finalPos = routeLine ? getClosestPointOnRoute(targetLat, targetLng, routeLine) : [targetLat, targetLng];
        
        userMarker.setLatLng(finalPos);

        // Плавная центровка
        if (map.getBounds && !map.getBounds().contains(finalPos)) {
            map.panTo(finalPos);
        }
    }
}
  // Функция находит ближайшую точку на линии маршрута
  function getClosestPointOnRoute(lat, lng, polyline) {
        const latlngs = polyline.getLatLngs();
        let minDistance = Infinity;
        let closestPoint = latlngs[0];

        latlngs.forEach(p => {
        const dist = map.distance([lat, lng], p);
        if (dist < minDistance) {
            minDistance = dist;
            closestPoint = p;
        }
    });
    // Если мы ближе 20 метров к дороге, "магнитим" нас к ней
    return minDistance < 20 ? closestPoint : [lat, lng];
    }
   </script>
</body>
</html>
